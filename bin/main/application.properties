spring.application.name=jobTable
server.port=8081

# ── PostgreSQL ───────────────────────────────────────────────────
# Relational: Job_Templates, Action_Master, Students, Job_Actions, Job_Workflow
# NoSQL(JSONB): Activity_Logs.content, Action_Master.action_config, Job_Templates.attributes
spring.datasource.url=jdbc:postgresql://localhost:5432/jobtable
spring.datasource.username=postgres
spring.datasource.password=ssafy
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Spring Security (개발 단계 임시 계정)
spring.security.user.name=admin
spring.security.user.password=admin
