<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학급 경제 — 관리자</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-bg: #0f172a;
  --sidebar-w: 230px;
  --bg: #f1f5f9;
  --surface: #ffffff;
  --border: #e2e8f0;
  --text: #0f172a;
  --muted: #64748b;
  --primary: #3b82f6;
  --primary-d: #2563eb;
  --danger: #ef4444;
  --success: #22c55e;
  --warning: #f59e0b;
  --radius: 10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
  display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden;
}

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--sidebar-bg); display: flex; flex-direction: column;
}
.sidebar-brand {
  padding: 22px 18px 16px;
  border-bottom: 1px solid #1e293b;
}
.sidebar-brand .logo { font-size: 20px; margin-bottom: 2px; }
.sidebar-brand .title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
.sidebar-brand .sub   { font-size: 11px; color: #475569; margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 10px 0; overflow-y: auto; }
.nav-section-label {
  padding: 12px 18px 4px;
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: #334155;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; cursor: pointer; font-size: 13.5px;
  color: #94a3b8; transition: background 0.1s, color 0.1s;
}
.nav-item:hover  { background: #1e293b; color: #cbd5e1; }
.nav-item.active { background: #1d4ed8; color: #fff; font-weight: 500; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  height: 58px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; flex-shrink: 0;
}
.topbar-title { font-size: 17px; font-weight: 600; }

.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Stats Grid ── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 14px; margin-bottom: 24px;
}
.stat-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 18px 20px;
}
.stat-icon  { font-size: 22px; margin-bottom: 10px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: var(--muted); margin-top: 5px; }

/* ── Section Header ── */
.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sec-header h2 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Table ── */
.table-wrap {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th {
  background: #f8fafc; font-weight: 600; font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted);
  padding: 11px 16px; text-align: left; border-bottom: 1px solid var(--border);
}
td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfc; }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px; font-size: 12px; font-weight: 500;
}
.badge-blue   { background: #eff6ff; color: #1d4ed8; }
.badge-gray   { background: #f1f5f9; color: #94a3b8; }
.badge-green  { background: #f0fdf4; color: #15803d; }
.badge-yellow { background: #fefce8; color: #a16207; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 7px; border: none;
  font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: all 0.1s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-d); }
.btn-ghost {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--bg); }
.btn-danger-soft { background: #fef2f2; color: var(--danger); border: none; }
.btn-danger-soft:hover { background: #fee2e2; }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* ── Job Cards ── */
.job-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 14px;
}
.job-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 18px; position: relative;
}
.job-card-top { display: flex; align-items: flex-start; justify-content: space-between; }
.job-card-icon { font-size: 30px; }
.job-card-actions { display: flex; gap: 4px; }
.job-card-name   { font-size: 15px; font-weight: 600; margin: 10px 0 3px; }
.job-card-salary { font-size: 13px; color: var(--muted); }
.job-card-meta   { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
.job-card-desc   { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.4; }

/* ── Log filter bar ── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-bar input {
  width: 160px; padding: 8px 11px;
  border: 1px solid var(--border); border-radius: 7px;
  font-size: 13px; outline: none; font-family: inherit;
}
.filter-bar input:focus { border-color: var(--primary); }

/* ── Workflow arrow ── */
.wf-flow { display: flex; align-items: center; gap: 8px; }
.wf-arrow { color: var(--muted); font-size: 16px; }

/* ── Modal ── */
.overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,0.45);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 14px; padding: 24px;
  width: 480px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.18);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}
.modal-title { font-size: 16px; font-weight: 600; }
.modal-close {
  background: none; border: none; font-size: 18px;
  cursor: pointer; color: var(--muted); padding: 2px 6px;
  border-radius: 5px; line-height: 1;
}
.modal-close:hover { background: var(--bg); }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px; margin-top: 22px;
  padding-top: 16px; border-top: 1px solid var(--border);
}

/* ── Form ── */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px;
}
.req { color: var(--danger); }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input[type=text], input[type=number], input[type=date],
input[type=color], select, textarea {
  width: 100%; padding: 9px 11px;
  border: 1px solid var(--border); border-radius: 7px;
  font-size: 13.5px; font-family: inherit; color: var(--text);
  background: #fff; outline: none; transition: border-color 0.1s;
}
input:focus, select:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
input[type=color] { height: 38px; padding: 3px; cursor: pointer; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── Dynamic fields in log modal ── */
.dyn-box {
  background: var(--bg); border-radius: 8px; padding: 14px;
  display: flex; flex-direction: column; gap: 10px; min-height: 56px;
}
.dyn-placeholder { font-size: 13px; color: var(--muted); }

/* ── Toast ── */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px;
  display: flex; flex-direction: column; gap: 8px; z-index: 200;
}
.toast {
  padding: 11px 16px; border-radius: 9px; font-size: 13.5px;
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  animation: toastIn 0.2s ease;
}
.toast-ok  { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
.toast-err { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ── Empty / Loading ── */
.empty   { padding: 48px; text-align: center; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.loading { padding: 32px; text-align: center; color: var(--muted); font-size: 14px; }

/* ── Log content cell ── */
.log-content {
  font-size: 12px; color: var(--muted);
  max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* ── Field builder (job-action config) ── */
.field-builder { display: flex; flex-direction: column; gap: 6px; }
.field-row {
  display: flex; align-items: center; gap: 6px;
  padding: 8px; background: var(--bg); border-radius: 7px;
}
.field-row input.fname { flex: 1; min-width: 80px; }
.field-row select.ftype { width: 90px; }
.field-row input.fnum   { width: 64px; }
.field-row input.fopts  { flex: 1; }
.field-row-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 0 2px; }
.field-row-btn:hover { color: var(--danger); }
.btn-add-field {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: 6px; font-size: 12px;
  background: #f0fdf4; color: #15803d;
  border: 1px solid #bbf7d0; cursor: pointer; font-family: inherit;
}
.btn-add-field:hover { background: #dcfce7; }

/* ── Job-action list inside job modal ── */
.ja-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: var(--bg); border-radius: 8px; margin-bottom: 6px;
}
.ja-item-left { display: flex; flex-direction: column; gap: 2px; }
.ja-item-name { font-size: 13.5px; font-weight: 500; }
.ja-item-code { font-size: 11px; color: var(--muted); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
<div id="sidebar">
  <div class="sidebar-brand">
    <div class="logo">🏫</div>
    <div class="title">학급 경제 시스템</div>
    <div class="sub">관리자 대시보드</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">개요</div>
    <div class="nav-item active" onclick="nav('dashboard', this)">
      <span class="nav-icon">📊</span>대시보드
    </div>
    <div class="nav-section-label">관리</div>
    <div class="nav-item" onclick="nav('students', this)">
      <span class="nav-icon">👥</span>학생
    </div>
    <div class="nav-item" onclick="nav('jobs', this)">
      <span class="nav-icon">💼</span>직업
    </div>
    <div class="nav-item" onclick="nav('actions', this)">
      <span class="nav-icon">⚡</span>행위
    </div>
    <div class="nav-item" onclick="nav('logs', this)">
      <span class="nav-icon">📋</span>활동 로그
    </div>
    <div class="nav-item" onclick="nav('workflow', this)">
      <span class="nav-icon">🔀</span>워크플로우
    </div>
  </nav>
</div>

<!-- ===== MAIN ===== -->
<div id="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">대시보드</div>
    <div id="topbar-action"></div>
  </div>

  <div class="content">

    <!-- Dashboard -->
    <div id="page-dashboard" class="page active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-value" id="stat-students">—</div>
          <div class="stat-label">전체 학생</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-value" id="stat-employed">—</div>
          <div class="stat-label">직업 보유 학생</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💼</div>
          <div class="stat-value" id="stat-jobs">—</div>
          <div class="stat-label">등록된 직업</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📋</div>
          <div class="stat-value" id="stat-logs">—</div>
          <div class="stat-label">전체 활동 로그</div>
        </div>
      </div>
      <div class="sec-header"><h2>최근 활동 로그</h2></div>
      <div class="table-wrap" id="dash-logs"><div class="loading">로드 중…</div></div>
    </div>

    <!-- Students -->
    <div id="page-students" class="page">
      <div class="table-wrap" id="students-table"><div class="loading">로드 중…</div></div>
    </div>

    <!-- Jobs -->
    <div id="page-jobs" class="page">
      <div class="job-grid" id="jobs-grid"><div class="loading">로드 중…</div></div>
    </div>

    <!-- Actions -->
    <div id="page-actions" class="page">
      <div class="table-wrap" id="actions-table"><div class="loading">로드 중…</div></div>
    </div>

    <!-- Logs -->
    <div id="page-logs" class="page">
      <div class="filter-bar">
        <input type="number" id="filter-sid"  placeholder="학생 ID 필터">
        <input type="number" id="filter-jaid" placeholder="행위 ID 필터">
        <button class="btn btn-ghost" onclick="loadLogs()">검색</button>
        <button class="btn btn-ghost" onclick="clearFilter()">초기화</button>
      </div>
      <div class="table-wrap" id="logs-table"><div class="loading">로드 중…</div></div>
    </div>

    <!-- Workflow -->
    <div id="page-workflow" class="page">
      <div class="table-wrap" id="workflow-table"><div class="loading">로드 중…</div></div>
    </div>

  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-wrap" id="toasts"></div>

<!-- ===== MODAL: 학생 추가 ===== -->
<div class="overlay" id="modal-student">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="ms-title">학생 추가</div>
      <button class="modal-close" onclick="closeModal('modal-student')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">이름 <span class="req">*</span></label>
      <input type="text" id="ms-name" placeholder="홍길동">
    </div>
    <div class="form-grid2">
      <div class="form-group">
        <label class="form-label">직업 ID</label>
        <input type="number" id="ms-job" placeholder="선택 사항">
      </div>
      <div class="form-group">
        <label class="form-label">초기 잔고</label>
        <input type="number" id="ms-bal" placeholder="0">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-student')">취소</button>
      <button class="btn btn-primary" onclick="submitStudent()">저장</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 직업 변경 ===== -->
<div class="overlay" id="modal-assign">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">직업 변경</div>
      <button class="modal-close" onclick="closeModal('modal-assign')">✕</button>
    </div>
    <div id="assign-student-info" style="font-size:13px;color:var(--muted);margin-bottom:16px"></div>
    <div class="form-group">
      <label class="form-label">직업 선택</label>
      <select id="assign-job-sel">
        <option value="">— 직업 없음 (해제) —</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-assign')">취소</button>
      <button class="btn btn-primary" onclick="submitAssign()">저장</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 직업 추가/수정 ===== -->
<div class="overlay" id="modal-job">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="mj-title">직업 추가</div>
      <button class="modal-close" onclick="closeModal('modal-job')">✕</button>
    </div>
    <div class="form-grid2">
      <div class="form-group">
        <label class="form-label">직업명 <span class="req">*</span></label>
        <input type="text" id="mj-name" placeholder="국세청">
      </div>
      <div class="form-group">
        <label class="form-label">기본 월급</label>
        <input type="number" id="mj-salary" placeholder="1000">
      </div>
    </div>
    <div class="form-grid2">
      <div class="form-group">
        <label class="form-label">아이콘</label>
        <input type="text" id="mj-icon" placeholder="🏛">
      </div>
      <div class="form-group">
        <label class="form-label">대표 색상</label>
        <input type="color" id="mj-color" value="#3b82f6">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">직업 설명</label>
      <input type="text" id="mj-desc" placeholder="학급 세금 관리 기관">
    </div>
    <div class="form-grid2">
      <div class="form-group">
        <label class="form-label">최대 인원</label>
        <input type="number" id="mj-maxcount" placeholder="1">
      </div>
      <div class="form-group">
        <label class="form-label">필수 여부</label>
        <select id="mj-required">
          <option value="true">필수</option>
          <option value="false">선택</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">자유 속성 <span style="font-size:11px;color:var(--muted)">(key / value)</span></label>
      <div class="field-builder" id="mj-attrs"></div>
      <button class="btn-add-field" style="margin-top:8px" onclick="addAttr('mj-attrs')">+ 속성 추가</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-job')">취소</button>
      <button class="btn btn-primary" onclick="submitJob()">저장</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 활동 로그 추가 ===== -->
<div class="overlay" id="modal-log">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">활동 로그 추가</div>
      <button class="modal-close" onclick="closeModal('modal-log')">✕</button>
    </div>
    <div class="form-grid2">
      <div class="form-group">
        <label class="form-label">학생 <span class="req">*</span></label>
        <select id="ml-student"></select>
      </div>
      <div class="form-group">
        <label class="form-label">직업-행위 ID <span class="req">*</span></label>
        <div style="display:flex;gap:6px">
          <input type="number" id="ml-jaid" placeholder="1" style="flex:1">
          <button class="btn btn-ghost btn-sm" onclick="loadSchema()">불러오기</button>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">입력 내용</label>
      <div class="dyn-box" id="ml-fields">
        <span class="dyn-placeholder">직업-행위 ID 입력 후 "불러오기" 클릭</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-log')">취소</button>
      <button class="btn btn-primary" onclick="submitLog()">저장</button>
    </div>
  </div>
</div>

<!-- ===== MODAL: 장부 편집 ===== -->
<!-- ===== MODAL: 학생 편집 ===== -->
<div class="overlay" id="modal-student-edit">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">학생 정보 수정</div>
      <button class="modal-close" onclick="closeModal('modal-student-edit')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">이름 <span class="req">*</span></label>
      <input type="text" id="mse-name" placeholder="홍길동">
    </div>
    <div class="form-grid2">
      <div class="form-group">
        <label class="form-label">잔고 (P)</label>
        <input type="number" id="mse-balance" placeholder="0">
      </div>
      <div class="form-group">

<script>
// ─────────────────────────── State ───────────────────────────
let allJobs     = [];
let allStudents = [];
let editJobId   = null;
let assignSid   = null;

// ─────────────────────────── Navigation ───────────────────────────
const PAGE_CONFIG = {
  dashboard: { title: '대시보드',   action: null },
  students:  { title: '학생 관리',  action: '+ 학생 추가', fn: () => openStudentModal() },
  jobs:      { title: '직업 관리',  action: '+ 직업 추가', fn: () => openJobModal() },
  actions:   { title: '행위 관리',  action: '+ 행위 추가', fn: () => openActionModal() },
  logs:      { title: '활동 로그',  action: '+ 로그 추가', fn: () => openLogModal() },
  workflow:  { title: '워크플로우', action: '+ 추가',       fn: () => openWfModal() },
};

function nav(page, el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('page-' + page).classList.add('active');
  const cfg = PAGE_CONFIG[page];
  document.getElementById('topbar-title').textContent = cfg.title;
  const actionEl = document.getElementById('topbar-action');
  if (cfg.action) {
    actionEl.innerHTML = `<button class="btn btn-primary" id="topbar-btn">${cfg.action}</button>`;
    document.getElementById('topbar-btn').onclick = cfg.fn;
  } else {
    actionEl.innerHTML = '';
  }
  loadPage(page);
}

function loadPage(p) {
  if (p === 'dashboard') loadDashboard();
  else if (p === 'students') loadStudents();
  else if (p === 'jobs') loadJobs();
  else if (p === 'actions') loadActions();
  else if (p === 'logs') loadLogs();
  else if (p === 'workflow') loadWorkflow();
}

// ─────────────────────────── API ───────────────────────────
async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) {
    const txt = await res.text();
    let msg = txt;
    try { msg = JSON.parse(txt)?.message || txt; } catch {}
    throw new Error(`${res.status} — ${msg}`);
  }
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

// ─────────────────────────── Toast ───────────────────────────
function toast(msg, isErr = false) {
  const w = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = `toast ${isErr ? 'toast-err' : 'toast-ok'}`;
  t.textContent = (isErr ? '✕  ' : '✓  ') + msg;
  w.appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ─────────────────────────── Modal ───────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(el =>
  el.addEventListener('click', e => { if (e.target === el) el.classList.remove('open'); })
);

// ─────────────────────────── Helpers ───────────────────────────
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const jobById  = id => allJobs.find(j => j.id === id);
const jobName  = id => jobById(id)?.name ?? `#${id}`;
const jobIcon  = id => jobById(id)?.attributes?.icon ?? '';
const studName = id => allStudents.find(s => s.id === id)?.name ?? `#${id}`;

function fmtDate(dt) {
  if (!dt) return '—';
  const d = new Date(dt);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function fmtContent(content) {
  if (!content) return '—';
  if (typeof content === 'object') {
    return Object.entries(content).map(([k,v]) => `${k}: ${v}`).join(' · ');
  }
  return String(content);
}

// ─────────────────────────── Dashboard ───────────────────────────
async function loadDashboard() {
  try {
    const [students, jobs, logs] = await Promise.all([
      api('GET', '/api/students'),
      api('GET', '/api/jobs'),
      api('GET', '/api/activity-logs'),
    ]);
    allStudents = students;
    allJobs     = jobs;
    document.getElementById('stat-students').textContent = students.length;
    document.getElementById('stat-employed').textContent = students.filter(s => s.currentJobId).length;
    document.getElementById('stat-jobs').textContent     = jobs.length;
    document.getElementById('stat-logs').textContent     = logs.length;
    renderLogsTable('dash-logs', [...logs].reverse().slice(0, 10), true);
  } catch (e) { toast('대시보드 로드 실패: ' + e.message, true); }
}

// ─────────────────────────── Students ───────────────────────────
async function loadStudents() {
  const el = document.getElementById('students-table');
  el.innerHTML = '<div class="loading">로드 중…</div>';
  try {
    const students = await api('GET', '/api/students');
    allStudents = students;
    if (!students.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">👥</div>등록된 학생이 없습니다.</div>';
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>이름</th><th>직업</th><th>잔고</th><th>작업</th></tr></thead>
        <tbody>${students.map(s => `
          <tr>
            <td style="color:var(--muted);font-size:12px">#${s.id}</td>
            <td><strong>${esc(s.name)}</strong></td>
            <td>${s.currentJobId
              ? `<span class="badge badge-blue">${esc(jobIcon(s.currentJobId))} ${esc(jobName(s.currentJobId))}</span>`
              : `<span class="badge badge-gray">미배정</span>`}
            </td>
            <td><strong>${(s.balance ?? 0).toLocaleString()}</strong> <span style="font-size:11px;color:var(--muted)">P</span></td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-ghost btn-sm" onclick="openStudentEdit(${s.id})">편집</button>
              <button class="btn btn-danger-soft btn-sm" onclick="deleteStudent(${s.id}, '${esc(s.name)}')">삭제</button>
            </td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

function openStudentModal() {
  document.getElementById('ms-title').textContent = '학생 추가';
  document.getElementById('ms-name').value = '';
  document.getElementById('ms-job').value  = '';
  document.getElementById('ms-bal').value  = '';
  openModal('modal-student');
}
async function submitStudent() {
  const name = document.getElementById('ms-name').value.trim();
  if (!name) { toast('이름을 입력하세요', true); return; }
  const jid = document.getElementById('ms-job').value;
  const bal = document.getElementById('ms-bal').value;
  const body = { name, balance: Number(bal) || 0 };
  if (jid) body.currentJobId = Number(jid);
  try {
    await api('POST', '/api/students', body);
    closeModal('modal-student');
    toast('학생이 추가되었습니다');
    loadStudents();
  } catch (e) { toast('실패: ' + e.message, true); }
}

let editStudentId = null;

function openStudentEdit(sid) {
  const s = allStudents.find(s => s.id === sid);
  if (!s) return;
  editStudentId = sid;
  document.getElementById('mse-name').value    = s.name ?? '';
  document.getElementById('mse-balance').value = s.balance ?? 0;
  const sel = document.getElementById('mse-job');
  sel.innerHTML = '<option value="">— 직업 없음 —</option>' +
    allJobs.map(j => `<option value="${j.id}" ${j.id === s.currentJobId ? 'selected' : ''}>${esc(j.attributes?.icon ?? '')} ${esc(j.name)}</option>`).join('');
  openModal('modal-student-edit');
}

async function submitStudentEdit() {
  const name = document.getElementById('mse-name').value.trim();
  if (!name) { toast('이름을 입력하세요', true); return; }
  const balance = Number(document.getElementById('mse-balance').value) || 0;
  const jid     = document.getElementById('mse-job').value;
  const body    = { name, balance };
  if (jid) body.currentJobId = Number(jid);
  try {
    await api('PUT', `/api/students/${editStudentId}`, body);
    closeModal('modal-student-edit');
    toast('학생 정보가 수정되었습니다');
    allStudents = await api('GET', '/api/students');
    loadStudents();
  } catch (e) { toast('실패: ' + e.message, true); }
}

function openAssign(sid) {
  assignSid = sid;
  const s = allStudents.find(s => s.id === sid);
  document.getElementById('assign-student-info').textContent =
    `학생: ${s?.name ?? sid}  |  현재 직업: ${s?.currentJobId ? jobName(s.currentJobId) : '없음'}`;
  const sel = document.getElementById('assign-job-sel');
  sel.innerHTML = '<option value="">— 직업 없음 (해제) —</option>' +
    allJobs.map(j => `<option value="${j.id}" ${j.id === s?.currentJobId ? 'selected' : ''}>${esc(j.attributes?.icon ?? '')} ${esc(j.name)}</option>`).join('');
  openModal('modal-assign');
}
async function submitAssign() {
  const jid = document.getElementById('assign-job-sel').value;
  try {
    await api('PATCH', `/api/students/${assignSid}/job`, { jobId: jid ? Number(jid) : null });
    closeModal('modal-assign');
    toast('직업이 변경되었습니다');
    allStudents = await api('GET', '/api/students');
    loadStudents();
  } catch (e) { toast('실패: ' + e.message, true); }
}

async function deleteStudent(id, name) {
  if (!confirm(`학생 "${name}"을 삭제하시겠습니까?`)) return;
  try {
    await api('DELETE', `/api/students/${id}`);
    toast('학생이 삭제되었습니다');
    loadStudents();
  } catch (e) { toast('실패: ' + e.message, true); }
}

// ─────────────────────────── Jobs ───────────────────────────
async function loadJobs() {
  const el = document.getElementById('jobs-grid');
  el.innerHTML = '<div class="loading">로드 중…</div>';
  try {
    const jobs = await api('GET', '/api/jobs');
    allJobs = jobs;
    if (!jobs.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">💼</div>등록된 직업이 없습니다.</div>';
      return;
    }
    el.innerHTML = jobs.map(j => {
      const a = j.attributes || {};
      const color = a.color || '#3b82f6';
      const employed = allStudents.filter(s => s.currentJobId === j.id).length;
      return `
        <div class="job-card" style="border-top:3px solid ${esc(color)}">
          <div class="job-card-top">
            <div class="job-card-icon">${esc(a.icon ?? '💼')}</div>
            <div class="job-card-actions">
              <button class="btn btn-ghost btn-sm" onclick="openJaModal(${j.id})">장부</button>
              <button class="btn btn-ghost btn-sm" onclick="openEditJob(${j.id})">편집</button>
              <button class="btn btn-danger-soft btn-sm" onclick="deleteJob(${j.id},'${esc(j.name)}')">삭제</button>
            </div>
          </div>
          <div class="job-card-name">${esc(j.name)}</div>
          <div class="job-card-salary">월급 ${(j.baseSalary ?? 0).toLocaleString()} P</div>
          <div class="job-card-meta">
            <span class="badge badge-blue">👥 ${employed} / ${a.maxCount ?? '∞'}</span>
            <span class="badge ${a.isRequired ? 'badge-yellow' : 'badge-green'}">${a.isRequired ? '필수' : '선택'}</span>
          </div>
          ${a.description ? `<div class="job-card-desc">${esc(a.description)}</div>` : ''}
        </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

function addAttr(cid) {
  const row = document.createElement('div');
  row.className = 'field-row';
  row.innerHTML = `
    <input type="text" class="fname" placeholder="key" style="flex:1">
    <input type="text" class="fval"  placeholder="value" style="flex:2">
    <button class="field-row-btn" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById(cid).appendChild(row);
}
function getAttrs(cid) {
  const obj = {};
  document.querySelectorAll(`#${cid} .field-row`).forEach(row => {
    const k = row.querySelector('.fname')?.value.trim();
    const v = row.querySelector('.fval')?.value.trim();
    if (k) obj[k] = v;
  });
  return Object.keys(obj).length ? obj : null;
}
function setAttrs(cid, attrs) {
  document.getElementById(cid).innerHTML = '';
  if (!attrs) return;
  Object.entries(attrs).forEach(([k, v]) => {
    addAttr(cid);
    const rows = document.querySelectorAll(`#${cid} .field-row`);
    const row = rows[rows.length - 1];
    row.querySelector('.fname').value = k;
    row.querySelector('.fval').value  = v ?? '';
  });
}
function openJobModal() {
  editJobId = null;
  document.getElementById('mj-title').textContent = '직업 추가';
  ['mj-name','mj-icon','mj-desc','mj-maxcount','mj-salary'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mj-color').value    = '#3b82f6';
  document.getElementById('mj-required').value = 'false';
  document.getElementById('mj-attrs').innerHTML = '';
  openModal('modal-job');
}
function openEditJob(id) {
  const j = allJobs.find(j => j.id === id);
  if (!j) return;
  editJobId = id;
  document.getElementById('mj-title').textContent = '직업 수정';
  document.getElementById('mj-name').value     = j.name ?? '';
  document.getElementById('mj-salary').value   = j.baseSalary ?? '';
  document.getElementById('mj-icon').value     = j.icon ?? '';
  document.getElementById('mj-color').value    = j.color ?? '#3b82f6';
  document.getElementById('mj-desc').value     = j.description ?? '';
  document.getElementById('mj-maxcount').value = j.maxCount ?? '';
  document.getElementById('mj-required').value = j.isRequired ? 'true' : 'false';
  setAttrs('mj-attrs', j.attributes);
  openModal('modal-job');
}
async function submitJob() {
  const name = document.getElementById('mj-name').value.trim();
  if (!name) { toast('직업명을 입력하세요', true); return; }
  const icon  = document.getElementById('mj-icon').value.trim();
  const desc  = document.getElementById('mj-desc').value.trim();
  const mc    = document.getElementById('mj-maxcount').value;
  const body  = {
    name,
    baseSalary:  Number(document.getElementById('mj-salary').value) || 0,
    color:       document.getElementById('mj-color').value,
    icon:        icon || null,
    description: desc || null,
    maxCount:    mc ? Number(mc) : null,
    isRequired:  document.getElementById('mj-required').value === 'true',
    attributes:  getAttrs('mj-attrs'),
  };
  try {
    if (editJobId) {
      await api('PUT', `/api/jobs/${editJobId}`, body);
      toast('직업이 수정되었습니다');
    } else {
      await api('POST', '/api/jobs', body);
      toast('직업이 추가되었습니다');
    }
    closeModal('modal-job');
    allJobs = await api('GET', '/api/jobs');
    loadJobs();
  } catch (e) { toast('실패: ' + e.message, true); }
}
async function deleteJob(id, name) {
  if (!confirm(`직업 "${name}"을 삭제하시겠습니까?`)) return;
  try {
    await api('DELETE', `/api/jobs/${id}`);
    toast('직업이 삭제되었습니다');
    allJobs = await api('GET', '/api/jobs');
    loadJobs();
  } catch (e) { toast('실패: ' + e.message, true); }
}

// ─────────────────────────── Actions ───────────────────────────
async function loadActions() {
  const el = document.getElementById('actions-table');
  el.innerHTML = '<div class="loading">로드 중…</div>';
  try {
    const actions = await api('GET', '/api/actions');
    if (!actions.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">⚡</div>등록된 행위가 없습니다.</div>';
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>코드</th><th>표시명</th><th>작업</th></tr></thead>
        <tbody>${actions.map(a => `
          <tr>
            <td style="color:var(--muted);font-size:12px">#${a.id}</td>
            <td><span class="badge badge-blue">${esc(a.actionCode)}</span></td>
            <td>${esc(a.displayName)}</td>

          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

function openActionModal() {
  document.getElementById('ma-code').value = '';
  document.getElementById('ma-name').value = '';
  document.getElementById('ma-cfg-title').value = '';
  document.getElementById('ma-fields').innerHTML = '';
  openModal('modal-action');
}
async function submitAction() {
  const code = document.getElementById('ma-code').value.trim();
  const name = document.getElementById('ma-name').value.trim();
  if (!code || !name) { toast('코드와 표시명을 입력하세요', true); return; }
  const title = document.getElementById('ma-cfg-title').value.trim();
  const fields = getFields('ma-fields');
  const cfg = {};
  if (title) cfg.title = title;
  if (fields.length) cfg.fields = fields;
  try {
    await api('POST', '/api/actions', {
      actionCode: code, displayName: name,
      actionConfig: Object.keys(cfg).length ? cfg : null,
    });
    closeModal('modal-action');
    toast('행위가 추가되었습니다');
    loadActions();
  } catch (e) { toast('실패: ' + e.message, true); }
}
let editActionId = null;
async function openActionEdit(id) {
  editActionId = id;
  try {
    const a = await api('GET', `/api/actions/${id}`);
    document.getElementById('mae-sub').textContent = `코드: ${a.actionCode}`;
    document.getElementById('mae-name').value = a.displayName;
    document.getElementById('mae-cfg-title').value = a.actionConfig?.title ?? '';
    const fieldsEl = document.getElementById('mae-fields');
    fieldsEl.innerHTML = '';
    (a.actionConfig?.fields ?? []).forEach(f => {
      addField('mae-fields');
      const row = fieldsEl.lastElementChild;
      row.querySelector('.fname').value = f.name ?? '';
      const sel = row.querySelector('.ftype');
      sel.value = f.type ?? 'text';
      onTypeChange(sel);
      if (f.type === 'number') {
        const nums = row.querySelectorAll('.fnum');
        if (nums[0] && f.min !== undefined) nums[0].value = f.min;
        if (nums[1] && f.max !== undefined) nums[1].value = f.max;
      } else if (f.type === 'select') {
        const optsEl = row.querySelector('.fopts');
        if (optsEl) optsEl.value = (f.options ?? []).join(',');
      }
    });
    openModal('modal-action-edit');
  } catch (e) { toast('로드 실패: ' + e.message, true); }
}
async function submitActionEdit() {
  const name = document.getElementById('mae-name').value.trim();
  if (!name) { toast('표시명을 입력하세요', true); return; }
  const code = document.getElementById('mae-sub').textContent.replace('코드: ', '');
  const title = document.getElementById('mae-cfg-title').value.trim();
  const fields = getFields('mae-fields');
  const cfg = {};
  if (title) cfg.title = title;
  if (fields.length) cfg.fields = fields;
  try {
    await api('PUT', `/api/actions/${editActionId}`, {
      actionCode: code, displayName: name,
      actionConfig: Object.keys(cfg).length ? cfg : null,
    });
    closeModal('modal-action-edit');
    toast('행위가 수정되었습니다');
    loadActions();
  } catch (e) { toast('실패: ' + e.message, true); }
}

async function deleteAction(id, name) {
  if (!confirm(`행위 "${name}"을 삭제하시겠습니까?\n이 행위가 연결된 직업-장부도 함께 삭제됩니다.`)) return;
  try {
    await api('DELETE', `/api/actions/${id}`);
    toast('행위가 삭제되었습니다');
    loadActions();
  } catch (e) { toast('실패: ' + e.message, true); }
}

// ─────────────────────────── Job-Action Modal ───────────────────────────

  const job = allJobs.find(j => j.id === jobId);

async function submitJobAction() {

// ── Field Builder ──
function addField(cid) {
  const row = document.createElement('div');
  row.className = 'field-row';
  row.innerHTML = `
    <input type="text" class="fname" placeholder="필드명">
    <select class="ftype" onchange="onTypeChange(this)">
      <option value="text">text</option>
      <option value="number">number</option>
      <option value="date">date</option>
      <option value="select">select</option>
    </select>
    <span class="fextra"></span>
    <button class="field-row-btn" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById(cid).appendChild(row);
}
function onTypeChange(sel) {
  const extra = sel.parentElement.querySelector('.fextra');
  if (sel.value === 'number') {
    extra.innerHTML = `<input type="number" class="fnum" placeholder="min"><input type="number" class="fnum fmax" placeholder="max">`;
  } else if (sel.value === 'select') {
    extra.innerHTML = `<input type="text" class="fopts" placeholder="옵션1,옵션2,…">`;
  } else {
    extra.innerHTML = '';
  }
}
function getFields(cid) {
  return Array.from(document.querySelectorAll(`#${cid} .field-row`)).map(row => {
    const name = row.querySelector('.fname')?.value.trim();
    const type = row.querySelector('.ftype')?.value || 'text';
    if (!name) return null;
    const f = { name, type };
    if (type === 'number') {
      const minEl = row.querySelector('.fnum');
      const maxEl = row.querySelector('.fmax');
      if (minEl?.value !== '') f.min = Number(minEl.value);
      if (maxEl?.value !== '') f.max = Number(maxEl.value);
    } else if (type === 'select') {
      const opts = row.querySelector('.fopts')?.value || '';
      f.options = opts.split(',').map(s => s.trim()).filter(Boolean);
    }
    return f;
  }).filter(Boolean);
}

// ─────────────────────────── Logs ───────────────────────────
async function loadLogs() {
  const el  = document.getElementById('logs-table');
  el.innerHTML = '<div class="loading">로드 중…</div>';
  try {
    const sid  = document.getElementById('filter-sid').value;
    const jaid = document.getElementById('filter-jaid').value;
    let logs;
    if (sid)       logs = await api('GET', `/api/activity-logs?studentId=${sid}`);
    else if (jaid) logs = await api('GET', `/api/activity-logs/by-job-action?jobActionId=${jaid}`);
    else           logs = await api('GET', '/api/activity-logs');
    renderLogsTable('logs-table', [...logs].reverse(), false);
  } catch (e) {
    el.innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

function renderLogsTable(elId, logs, compact) {
  const el = document.getElementById(elId);
  if (!logs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>로그가 없습니다.</div>';
    return;
  }
  el.innerHTML = `
    <table>
      <thead><tr>
        <th>ID</th><th>학생</th><th>행위 코드</th><th>내용 요약</th>
        ${!compact ? '<th>날짜</th>' : ''}
      </tr></thead>
      <tbody>${logs.map(log => `
        <tr>
          <td style="color:var(--muted);font-size:12px">#${log.id}</td>
          <td><strong>${esc(log.studentName ?? studName(log.studentId))}</strong></td>
          <td><span class="badge badge-blue">${esc(log.actionCode ?? `#${log.jobActionId}`)}</span></td>
          <td><div class="log-content" title="${esc(fmtContent(log.content))}">${esc(fmtContent(log.content))}</div></td>
          ${!compact ? `<td style="color:var(--muted);font-size:12px">${fmtDate(log.createdAt)}</td>` : ''}
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function clearFilter() {
  document.getElementById('filter-sid').value  = '';
  document.getElementById('filter-jaid').value = '';
  loadLogs();
}

function openLogModal() {
  const sel = document.getElementById('ml-student');
  sel.innerHTML = allStudents.map(s =>
    `<option value="${s.id}">${esc(s.name)}${s.currentJobId ? ' (' + esc(jobName(s.currentJobId)) + ')' : ''}</option>`
  ).join('');
  document.getElementById('ml-jaid').value = '';
  document.getElementById('ml-fields').innerHTML = '<span class="dyn-placeholder">직업-행위 ID 입력 후 "불러오기" 클릭</span>';
  openModal('modal-log');
}

async function loadSchema() {
  const jaid = document.getElementById('ml-jaid').value;
  const box  = document.getElementById('ml-fields');
  if (!jaid) { toast('행위 ID를 입력하세요', true); return; }
  box.innerHTML = '<span class="dyn-placeholder">불러오는 중…</span>';
  try {
    const data   = await api('GET', `/api/job-actions/${jaid}`);
    const fields = data.actionConfig?.fields ?? [];
    if (!fields.length) {
      box.innerHTML = `<span class="dyn-placeholder">등록된 입력 필드 없음 (${esc(data.displayName)})</span>`;
      return;
    }
    box.innerHTML = `<div style="font-size:12px;color:var(--muted);margin-bottom:4px">${esc(data.actionConfig?.title ?? data.displayName)}</div>`;
    fields.forEach(f => {
      const name = f.name, type = f.type || 'text';
      let inp;
      if (type === 'select') {
        inp = `<select class="cf" data-key="${esc(name)}">${(f.options ?? []).map(o => `<option>${esc(o)}</option>`).join('')}</select>`;
      } else if (type === 'date') {
        inp = `<input type="date" class="cf" data-key="${esc(name)}">`;
      } else if (type === 'number') {
        inp = `<input type="number" class="cf" data-key="${esc(name)}"
          ${f.min !== undefined ? `min="${f.min}"` : ''}
          ${f.max !== undefined ? `max="${f.max}"` : ''}
          placeholder="${esc(name)}">`;
      } else {
        inp = `<input type="text" class="cf" data-key="${esc(name)}" placeholder="${esc(name)}">`;
      }
      const g = document.createElement('div');
      g.className = 'form-group';
      g.style.marginBottom = '0';
      g.innerHTML = `<label class="form-label">${esc(name)}</label>${inp}`;
      box.appendChild(g);
    });
  } catch (e) { toast('스키마 로드 실패: ' + e.message, true); }
}

async function submitLog() {
  const sid  = document.getElementById('ml-student').value;
  const jaid = document.getElementById('ml-jaid').value;
  if (!sid || !jaid) { toast('학생과 행위 ID를 입력하세요', true); return; }
  const content = {};
  document.querySelectorAll('#ml-fields .cf').forEach(el => { content[el.dataset.key] = el.value.trim(); });
  try {
    await api('POST', '/api/activity-logs', { studentId: Number(sid), jobActionId: Number(jaid), content });
    closeModal('modal-log');
    toast('로그가 추가되었습니다');
    loadLogs();
  } catch (e) { toast('실패: ' + e.message, true); }
}

// ─────────────────────────── Workflow ───────────────────────────
async function loadWorkflow() {
  const el = document.getElementById('workflow-table');
  el.innerHTML = '<div class="loading">로드 중…</div>';
  try {
    const wfs = await api('GET', '/api/workflows');
    if (!wfs.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">🔀</div>워크플로우가 없습니다.</div>';
      return;
    }
    el.innerHTML = `
      <table>
        <thead><tr><th>ID</th><th>흐름</th><th>문서 유형</th><th>설명</th><th>작업</th></tr></thead>
        <tbody>${wfs.map(w => `
          <tr>
            <td style="color:var(--muted);font-size:12px">#${w.id}</td>
            <td>
              <div class="wf-flow">
                <span class="badge badge-blue">${esc(w.fromJobName ?? w.fromJobId)}</span>
                <span class="wf-arrow">→</span>
                <span class="badge badge-blue">${esc(w.toJobName ?? w.toJobId)}</span>
              </div>
            </td>
            <td>${w.documentType ? `<span class="badge badge-green">${esc(w.documentType)}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
            <td style="color:var(--muted);font-size:13px">${esc(w.description ?? '')}</td>
            <td><button class="btn btn-danger-soft btn-sm" onclick="deleteWorkflow(${w.id})">삭제</button></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    el.innerHTML = `<div class="empty">로드 실패: ${esc(e.message)}</div>`;
  }
}

async function openWfModal() {
  if (!allJobs.length) {
    try { allJobs = await api('GET', '/api/jobs'); } catch {}
  }
  const jobOpts = allJobs.map(j => `<option value="${j.id}">${esc(j.attributes?.icon ?? '')} ${esc(j.name)}</option>`).join('');
  document.getElementById('mw-from').innerHTML = jobOpts;
  document.getElementById('mw-to').innerHTML   = jobOpts;
  document.getElementById('mw-doc').value  = '';
  document.getElementById('mw-desc').value = '';
  openModal('modal-wf');
}
async function submitWorkflow() {
  const from = document.getElementById('mw-from').value;
  const to   = document.getElementById('mw-to').value;
  if (!from || !to) { toast('직업을 선택하세요', true); return; }
  const body = { fromJobId: Number(from), toJobId: Number(to) };
  const doc  = document.getElementById('mw-doc').value.trim();
  const desc = document.getElementById('mw-desc').value.trim();
  if (doc)  body.documentType = doc;
  if (desc) body.description  = desc;
  try {
    await api('POST', '/api/workflows', body);
    closeModal('modal-wf');
    toast('워크플로우가 추가되었습니다');
    loadWorkflow();
  } catch (e) { toast('실패: ' + e.message, true); }
}
async function deleteWorkflow(id) {
  if (!confirm('워크플로우를 삭제하시겠습니까?')) return;
  try {
    await api('DELETE', `/api/workflows/${id}`);
    toast('삭제되었습니다');
    loadWorkflow();
  } catch (e) { toast('실패: ' + e.message, true); }
}

// ─────────────────────────── Init ───────────────────────────
async function init() {
  try {
    [allJobs, allStudents] = await Promise.all([
      api('GET', '/api/jobs'),
      api('GET', '/api/students'),
    ]);
  } catch (e) { console.error('init failed', e); }
  loadDashboard();
}
init();
